<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý công việc hành chính</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #eef4fb 0%, #f7f9fc 100%);
    color: #2c3e50;
    min-height: 100vh;
    padding: 24px;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(60, 90, 130, 0.08);
    overflow: hidden;
  }
  header {
    background: linear-gradient(90deg, #4a90c2 0%, #6aa9d4 100%);
    color: #fff;
    padding: 24px 32px;
  }
  header h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  header p {
    margin-top: 4px;
    font-size: 14px;
    opacity: 0.92;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 20px 32px;
    background: #f5f8fc;
    border-bottom: 1px solid #e3eaf2;
    align-items: center;
  }
  .toolbar input[type="text"],
  .toolbar select {
    padding: 9px 12px;
    border: 1px solid #cdd8e3;
    border-radius: 6px;
    font-size: 14px;
    background: #fff;
    color: #2c3e50;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .toolbar input[type="text"]:focus,
  .toolbar select:focus {
    outline: none;
    border-color: #4a90c2;
    box-shadow: 0 0 0 3px rgba(74, 144, 194, 0.15);
  }
  .toolbar input[type="text"] {
    flex: 1;
    min-width: 220px;
  }
  .btn {
    padding: 9px 18px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.05s;
    font-weight: 500;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: #4a90c2;
    color: #fff;
  }
  .btn-primary:hover { background: #3d7da8; }
  .btn-secondary {
    background: #e8eef5;
    color: #2c3e50;
  }
  .btn-secondary:hover { background: #d8e2ee; }
  .btn-danger {
    background: #e57373;
    color: #fff;
  }
  .btn-danger:hover { background: #d65f5f; }
  .btn-success {
    background: #4caf80;
    color: #fff;
  }
  .btn-success:hover { background: #3d9468; }
  .btn-small {
    padding: 6px 12px;
    font-size: 12.5px;
  }

  .table-wrap {
    padding: 8px 0;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  thead th {
    background: #f0f5fa;
    color: #4a6985;
    text-align: left;
    padding: 12px 16px;
    font-weight: 600;
    border-bottom: 2px solid #e3eaf2;
    white-space: nowrap;
  }
  tbody td {
    padding: 13px 16px;
    border-bottom: 1px solid #eef2f7;
    vertical-align: middle;
  }
  tbody tr:hover { background: #f9fbfd; }
  .col-actions { white-space: nowrap; text-align: right; }
  .col-stt { width: 50px; text-align: center; color: #7a8a9c; }
  .col-date { white-space: nowrap; color: #5a6b7e; }

  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12.5px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-todo      { background: #f0f2f5; color: #5a6b7e; }
  .badge-doing     { background: #e1efff; color: #2e6fb5; }
  .badge-waiting   { background: #fff3d6; color: #a37a17; }
  .badge-done      { background: #d8f0df; color: #2e7d4a; }

  .priority-cao    { color: #c0392b; font-weight: 600; }
  .priority-trungbinh { color: #d68910; }
  .priority-thap   { color: #5a8a5a; }

  .due-tag {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .due-overdue { background: #fde0e0; color: #c0392b; }
  .due-soon    { background: #fff3d6; color: #a37a17; }

  .empty {
    text-align: center;
    padding: 50px 20px;
    color: #8a9aae;
    font-style: italic;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(40, 60, 85, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff;
    border-radius: 10px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    overflow: hidden;
    animation: pop 0.18s ease-out;
  }
  @keyframes pop {
    from { transform: scale(0.96); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .modal-header {
    padding: 18px 24px;
    background: #f5f8fc;
    border-bottom: 1px solid #e3eaf2;
    font-size: 17px;
    font-weight: 600;
    color: #2c3e50;
  }
  .modal-body { padding: 22px 24px; }
  .modal-footer {
    padding: 14px 24px;
    background: #f9fbfd;
    border-top: 1px solid #eef2f7;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    margin-bottom: 5px;
    font-size: 13.5px;
    color: #4a6985;
    font-weight: 500;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #cdd8e3;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    color: #2c3e50;
    background: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #4a90c2;
    box-shadow: 0 0 0 3px rgba(74, 144, 194, 0.15);
  }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .stats {
    display: flex;
    gap: 12px;
    padding: 16px 32px;
    background: #fff;
    flex-wrap: wrap;
    border-bottom: 1px solid #eef2f7;
  }
  .stat-card {
    flex: 1;
    min-width: 140px;
    background: #f7faff;
    border: 1px solid #e3eaf2;
    border-radius: 8px;
    padding: 12px 16px;
  }
  .stat-card .label {
    font-size: 12.5px;
    color: #7a8a9c;
    margin-bottom: 4px;
  }
  .stat-card .value {
    font-size: 22px;
    font-weight: 600;
    color: #2c3e50;
  }
  .stat-card.todo    { border-left: 4px solid #8a9aae; }
  .stat-card.doing   { border-left: 4px solid #4a90c2; }
  .stat-card.waiting { border-left: 4px solid #d4a017; }
  .stat-card.done    { border-left: 4px solid #4caf80; }

  @media (max-width: 640px) {
    body { padding: 12px; }
    header, .toolbar, .stats { padding-left: 18px; padding-right: 18px; }
    thead { display: none; }
    tbody td { display: block; padding: 6px 18px; border: none; }
    tbody tr {
      display: block;
      border-bottom: 1px solid #eef2f7;
      padding: 10px 0;
    }
    .col-actions { text-align: left; padding-top: 10px !important; }
    .col-stt { display: none !important; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Hệ thống Quản lý Công việc Hành chính</h1>
      <p>Theo dõi, phân công và quản lý tiến độ công việc văn phòng</p>
    </header>

    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm theo tên công việc, người phụ trách..." />
      <select id="filterStatus">
        <option value="all">Tất cả trạng thái</option>
        <option value="todo">Chưa thực hiện</option>
        <option value="doing">Đang thực hiện</option>
        <option value="waiting">Chờ phản hồi</option>
        <option value="done">Đã hoàn thành</option>
      </select>
      <button class="btn btn-primary" onclick="openModal()">+ Thêm công việc</button>
      <button class="btn btn-success" onclick="openExportModal()">📥 Xuất Excel</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-stt">STT</th>
            <th>Tên công việc</th>
            <th>Người phụ trách</th>
            <th>Hạn xử lý</th>
            <th>Ưu tiên</th>
            <th>Trạng thái</th>
            <th class="col-actions">Thao tác</th>
          </tr>
        </thead>
        <tbody id="taskTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal xuất Excel -->
  <div class="modal-overlay" id="exportModal">
    <div class="modal">
      <div class="modal-header">📥 Xuất danh sách công việc ra Excel</div>
      <div class="modal-body">
        <div class="form-group">
          <label for="exportCriteria">Tiêu chí xuất</label>
          <select id="exportCriteria" onchange="onExportCriteriaChange()">
            <option value="all">Toàn bộ công việc</option>
            <option value="done">✅ Đã hoàn thành</option>
            <option value="soon">⏰ Sắp đến hạn</option>
            <option value="overdue">⚠️ Quá hạn (chưa hoàn thành)</option>
            <option value="status">Theo trạng thái cụ thể</option>
          </select>
        </div>

        <div class="form-group" id="statusFilterGroup" style="display:none">
          <label for="exportStatus">Trạng thái</label>
          <select id="exportStatus">
            <option value="todo">Chưa thực hiện</option>
            <option value="doing">Đang thực hiện</option>
            <option value="waiting">Chờ phản hồi</option>
            <option value="done">Đã hoàn thành</option>
          </select>
        </div>

        <div class="form-group" id="soonDaysGroup" style="display:none">
          <label for="exportSoonDays">Sắp đến hạn trong vòng (ngày)</label>
          <input type="number" id="exportSoonDays" value="7" min="1" max="365" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="exportFromDate">Từ ngày (hạn xử lý)</label>
            <input type="date" id="exportFromDate" />
          </div>
          <div class="form-group">
            <label for="exportToDate">Đến ngày (hạn xử lý)</label>
            <input type="date" id="exportToDate" />
          </div>
        </div>

        <div style="background:#f5f8fc;border:1px solid #e3eaf2;border-radius:6px;padding:10px 14px;font-size:13px;color:#4a6985">
          <strong id="exportPreviewCount">0</strong> công việc phù hợp sẽ được xuất.
          <button type="button" class="btn btn-secondary btn-small" style="margin-left:8px" onclick="updateExportPreview()">🔄 Cập nhật</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeExportModal()">Huỷ</button>
        <button class="btn btn-success" onclick="exportToExcel()">📥 Tải file Excel</button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header" id="modalTitle">Thêm công việc mới</div>
      <div class="modal-body">
        <form id="taskForm">
          <input type="hidden" id="taskId" />
          <div class="form-group">
            <label for="taskName">Tên công việc <span style="color:#c0392b">*</span></label>
            <input type="text" id="taskName" required placeholder="Ví dụ: Soạn công văn gửi Sở..." />
          </div>
          <div class="form-group">
            <label for="taskDesc">Mô tả chi tiết</label>
            <textarea id="taskDesc" placeholder="Nội dung công việc..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="taskAssignee">Người phụ trách <span style="color:#c0392b">*</span></label>
              <input type="text" id="taskAssignee" required placeholder="Họ tên..." />
            </div>
            <div class="form-group">
              <label for="taskDue">Hạn xử lý</label>
              <input type="date" id="taskDue" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="taskPriority">Mức độ ưu tiên</label>
              <select id="taskPriority">
                <option value="thap">Thấp</option>
                <option value="trungbinh" selected>Trung bình</option>
                <option value="cao">Cao</option>
              </select>
            </div>
            <div class="form-group">
              <label for="taskStatus">Trạng thái</label>
              <select id="taskStatus">
                <option value="todo">Chưa thực hiện</option>
                <option value="doing">Đang thực hiện</option>
                <option value="waiting">Chờ phản hồi</option>
                <option value="done">Đã hoàn thành</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Huỷ</button>
        <button class="btn btn-primary" onclick="saveTask()">Lưu</button>
      </div>
    </div>
  </div>

<script>
  const STATUS_LABELS = {
    todo:    { text: 'Chưa thực hiện', cls: 'badge-todo' },
    doing:   { text: 'Đang thực hiện', cls: 'badge-doing' },
    waiting: { text: 'Chờ phản hồi',   cls: 'badge-waiting' },
    done:    { text: 'Đã hoàn thành',  cls: 'badge-done' },
  };
  const PRIORITY_LABELS = {
    cao:       { text: 'Cao',        cls: 'priority-cao' },
    trungbinh: { text: 'Trung bình', cls: 'priority-trungbinh' },
    thap:      { text: 'Thấp',       cls: 'priority-thap' },
  };

  let tasks = JSON.parse(localStorage.getItem('admin_tasks') || 'null');
  if (!tasks) {
    // Dữ liệu mẫu ban đầu
    tasks = [
      { id: 1, name: 'Soạn công văn gửi Sở Nội vụ', desc: 'Báo cáo nhân sự quý II', assignee: 'Nguyễn Văn An', due: '2026-06-10', priority: 'cao', status: 'doing' },
      { id: 2, name: 'Chuẩn bị hồ sơ họp giao ban', desc: 'In tài liệu cho 15 đại biểu', assignee: 'Trần Thị Bình', due: '2026-06-05', priority: 'trungbinh', status: 'todo' },
      { id: 3, name: 'Đặt lịch họp với phòng Kế toán', desc: '', assignee: 'Lê Minh Cường', due: '2026-06-08', priority: 'thap', status: 'waiting' },
      { id: 4, name: 'Lưu trữ hồ sơ tháng 5', desc: 'Phân loại và đánh số', assignee: 'Phạm Thuỳ Dung', due: '2026-05-30', priority: 'trungbinh', status: 'done' },
    ];
    saveToStorage();
  }

  function saveToStorage() {
    localStorage.setItem('admin_tasks', JSON.stringify(tasks));
  }

  function nextId() {
    return tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
  }

  function formatDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  // Trả về số ngày từ hôm nay đến hạn (âm = quá hạn)
  function daysUntilDue(dueStr) {
    if (!dueStr) return null;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const due = new Date(dueStr + 'T00:00:00');
    return Math.round((due - today) / (1000 * 60 * 60 * 24));
  }

  function getDueTag(task) {
    if (!task.due || task.status === 'done') return '';
    const days = daysUntilDue(task.due);
    if (days === null) return '';
    if (days < 0) return `<span class="due-tag due-overdue">Quá hạn ${Math.abs(days)} ngày</span>`;
    if (days === 0) return `<span class="due-tag due-overdue">Hôm nay</span>`;
    if (days <= 3) return `<span class="due-tag due-soon">Còn ${days} ngày</span>`;
    return '';
  }

  function render() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    const status = document.getElementById('filterStatus').value;

    const filtered = tasks.filter(t => {
      const matchSearch = !search ||
        t.name.toLowerCase().includes(search) ||
        (t.assignee || '').toLowerCase().includes(search) ||
        (t.desc || '').toLowerCase().includes(search);
      const matchStatus = status === 'all' || t.status === status;
      return matchSearch && matchStatus;
    });

    const tbody = document.getElementById('taskTable');
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty">Không có công việc nào phù hợp.</td></tr>`;
    } else {
      tbody.innerHTML = filtered.map((t, i) => {
        const st = STATUS_LABELS[t.status];
        const pr = PRIORITY_LABELS[t.priority] || PRIORITY_LABELS.trungbinh;
        return `
          <tr>
            <td class="col-stt">${i + 1}</td>
            <td>
              <div style="font-weight:500;color:#2c3e50">${escapeHtml(t.name)}</div>
              ${t.desc ? `<div style="font-size:12.5px;color:#7a8a9c;margin-top:2px">${escapeHtml(t.desc)}</div>` : ''}
            </td>
            <td>${escapeHtml(t.assignee || '—')}</td>
            <td class="col-date">${formatDate(t.due)}${getDueTag(t)}</td>
            <td class="${pr.cls}">${pr.text}</td>
            <td><span class="badge ${st.cls}">${st.text}</span></td>
            <td class="col-actions">
              <button class="btn btn-secondary btn-small" onclick="editTask(${t.id})">✏️ Sửa</button>
              <button class="btn btn-danger btn-small" onclick="deleteTask(${t.id})">🗑️ Xoá</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    renderStats();
  }

  function renderStats() {
    const counts = { todo: 0, doing: 0, waiting: 0, done: 0 };
    tasks.forEach(t => counts[t.status]++);
    document.getElementById('stats').innerHTML = `
      <div class="stat-card todo">
        <div class="label">Chưa thực hiện</div>
        <div class="value">${counts.todo}</div>
      </div>
      <div class="stat-card doing">
        <div class="label">Đang thực hiện</div>
        <div class="value">${counts.doing}</div>
      </div>
      <div class="stat-card waiting">
        <div class="label">Chờ phản hồi</div>
        <div class="value">${counts.waiting}</div>
      </div>
      <div class="stat-card done">
        <div class="label">Đã hoàn thành</div>
        <div class="value">${counts.done}</div>
      </div>
    `;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  function openModal(task = null) {
    document.getElementById('modal').classList.add('active');
    document.getElementById('modalTitle').textContent = task ? 'Chỉnh sửa công việc' : 'Thêm công việc mới';
    document.getElementById('taskId').value       = task ? task.id : '';
    document.getElementById('taskName').value     = task ? task.name : '';
    document.getElementById('taskDesc').value     = task ? (task.desc || '') : '';
    document.getElementById('taskAssignee').value = task ? task.assignee : '';
    document.getElementById('taskDue').value      = task ? (task.due || '') : '';
    document.getElementById('taskPriority').value = task ? task.priority : 'trungbinh';
    document.getElementById('taskStatus').value   = task ? task.status : 'todo';
    setTimeout(() => document.getElementById('taskName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
  }

  function saveTask() {
    const name = document.getElementById('taskName').value.trim();
    const assignee = document.getElementById('taskAssignee').value.trim();
    if (!name) { alert('Vui lòng nhập tên công việc.'); return; }
    if (!assignee) { alert('Vui lòng nhập người phụ trách.'); return; }

    const data = {
      name,
      desc: document.getElementById('taskDesc').value.trim(),
      assignee,
      due: document.getElementById('taskDue').value,
      priority: document.getElementById('taskPriority').value,
      status: document.getElementById('taskStatus').value,
    };
    const id = document.getElementById('taskId').value;
    if (id) {
      const idx = tasks.findIndex(t => t.id === parseInt(id));
      if (idx >= 0) tasks[idx] = { ...tasks[idx], ...data };
    } else {
      tasks.unshift({ id: nextId(), ...data });
    }
    saveToStorage();
    closeModal();
    render();
  }

  function editTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) openModal(task);
  }

  function deleteTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    if (confirm(`Bạn có chắc muốn xoá công việc:\n"${task.name}"?`)) {
      tasks = tasks.filter(t => t.id !== id);
      saveToStorage();
      render();
    }
  }

  // ===== XUẤT EXCEL =====
  // Tải thư viện SheetJS theo yêu cầu (không chặn lúc tải trang)
  function loadXLSX() {
    return new Promise((resolve, reject) => {
      if (window.XLSX) return resolve(window.XLSX);
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload = () => resolve(window.XLSX);
      s.onerror = () => reject(new Error('Không thể tải thư viện xuất Excel. Vui lòng kiểm tra kết nối mạng.'));
      document.head.appendChild(s);
    });
  }

  function openExportModal() {
    document.getElementById('exportModal').classList.add('active');
    document.getElementById('exportCriteria').value = 'all';
    document.getElementById('exportStatus').value = 'todo';
    document.getElementById('exportSoonDays').value = 7;
    document.getElementById('exportFromDate').value = '';
    document.getElementById('exportToDate').value = '';
    onExportCriteriaChange();
    updateExportPreview();
  }
  function closeExportModal() {
    document.getElementById('exportModal').classList.remove('active');
  }
  function onExportCriteriaChange() {
    const v = document.getElementById('exportCriteria').value;
    document.getElementById('statusFilterGroup').style.display = (v === 'status') ? 'block' : 'none';
    document.getElementById('soonDaysGroup').style.display = (v === 'soon') ? 'block' : 'none';
    updateExportPreview();
  }

  function getExportFiltered() {
    const criteria = document.getElementById('exportCriteria').value;
    const statusSel = document.getElementById('exportStatus').value;
    const soonDays = parseInt(document.getElementById('exportSoonDays').value || '7', 10);
    const fromDate = document.getElementById('exportFromDate').value;
    const toDate   = document.getElementById('exportToDate').value;

    return tasks.filter(t => {
      // Lọc theo tiêu chí
      if (criteria === 'done' && t.status !== 'done') return false;
      if (criteria === 'status' && t.status !== statusSel) return false;
      if (criteria === 'overdue') {
        if (t.status === 'done') return false;
        const d = daysUntilDue(t.due);
        if (d === null || d >= 0) return false;
      }
      if (criteria === 'soon') {
        if (t.status === 'done') return false;
        const d = daysUntilDue(t.due);
        if (d === null || d < 0 || d > soonDays) return false;
      }
      // Lọc theo khoảng thời gian hạn xử lý
      if (fromDate && (!t.due || t.due < fromDate)) return false;
      if (toDate   && (!t.due || t.due > toDate))   return false;
      return true;
    });
  }

  function updateExportPreview() {
    const count = getExportFiltered().length;
    document.getElementById('exportPreviewCount').textContent = count;
  }

  function getCriteriaLabel() {
    const v = document.getElementById('exportCriteria').value;
    const map = {
      all: 'Toan_bo',
      done: 'Da_hoan_thanh',
      soon: 'Sap_den_han',
      overdue: 'Qua_han',
      status: 'Theo_trang_thai_' + document.getElementById('exportStatus').value
    };
    return map[v] || 'Cong_viec';
  }

  async function exportToExcel() {
    const data = getExportFiltered();
    if (data.length === 0) {
      alert('Không có công việc nào phù hợp với tiêu chí để xuất.');
      return;
    }

    // Đảm bảo thư viện đã sẵn sàng
    let XLSX;
    try {
      XLSX = await loadXLSX();
    } catch (err) {
      alert(err.message);
      return;
    }

    // Chuẩn bị dữ liệu xuất
    const rows = data.map((t, i) => {
      const d = daysUntilDue(t.due);
      let tinhTrangHan = '';
      if (t.status === 'done') {
        tinhTrangHan = 'Đã hoàn thành';
      } else if (d === null) {
        tinhTrangHan = 'Không có hạn';
      } else if (d < 0) {
        tinhTrangHan = `Quá hạn ${Math.abs(d)} ngày`;
      } else if (d === 0) {
        tinhTrangHan = 'Đến hạn hôm nay';
      } else {
        tinhTrangHan = `Còn ${d} ngày`;
      }

      return {
        'STT': i + 1,
        'Tên công việc': t.name,
        'Mô tả': t.desc || '',
        'Người phụ trách': t.assignee || '',
        'Hạn xử lý': t.due ? formatDate(t.due) : '',
        'Mức độ ưu tiên': (PRIORITY_LABELS[t.priority] || {}).text || '',
        'Trạng thái': (STATUS_LABELS[t.status] || {}).text || '',
        'Tình trạng hạn': tinhTrangHan
      };
    });

    // Tạo workbook
    const ws = XLSX.utils.json_to_sheet(rows);

    // Cấu hình độ rộng cột
    ws['!cols'] = [
      { wch: 5 },   // STT
      { wch: 35 },  // Tên
      { wch: 40 },  // Mô tả
      { wch: 20 },  // Người phụ trách
      { wch: 14 },  // Hạn
      { wch: 14 },  // Ưu tiên
      { wch: 18 },  // Trạng thái
      { wch: 20 },  // Tình trạng hạn
    ];

    const wb = XLSX.utils.book_new();
    const sheetName = getCriteriaLabel().substring(0, 30);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);

    // Tên file
    const now = new Date();
    const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    const filename = `DanhSachCongViec_${getCriteriaLabel()}_${stamp}.xlsx`;

    XLSX.writeFile(wb, filename);
    closeExportModal();
  }

  document.getElementById('exportModal').addEventListener('click', e => {
    if (e.target.id === 'exportModal') closeExportModal();
  });
  ['exportCriteria','exportStatus','exportSoonDays','exportFromDate','exportToDate']
    .forEach(id => document.getElementById(id).addEventListener('change', updateExportPreview));

  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('filterStatus').addEventListener('change', render);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  render();
</script>
